            { num: 42, text: "Вопрос 42. В конструкции SET salary = salary * 1.05 оператора UPDATE, чем является знак = ?", options: [{text: "A) Знаком математического равенства", isCorrect: false}, {text: "B) Оператором присваивания нового значения в ячейку", isCorrect: true}, {text: "C) Логическим условием", isCorrect: false}, {text: "D) Системным разделителем", isCorrect: false}, {text: "E) Указателем на ключ", isCorrect: false}] },
            { num: 43, text: "Вопрос 43. Какой результат вернет СУБД, если умножить ячейку со значением NULL: SET bonus = bonus * 1.15 ?", options: [{text: "A) Увеличится на 15%", isCorrect: false}, {text: "B) Запишется 1.15", isCorrect: false}, {text: "C) Значение ячейки останется NULL (неопределенным)", isCorrect: true}, {text: "D) Станет 0", isCorrect: false}, {text: "E) Выдаст ошибку", isCorrect: false}] },
            { num: 44, text: "Вопрос 44. Какое математическое выражение корректно увеличит значение столбца duration на 15 единиц?", options: [{text: "A) SET duration = 15", isCorrect: false}, {text: "B) SET duration = duration + 15", isCorrect: true}, {text: "C) SET duration == +15", isCorrect: false}, {text: "D) UPDATE duration + 15", isCorrect: false}, {text: "E) SET duration = SUM(15)", isCorrect: false}] },
            { num: 45, text: "Вопрос 45. Какое фундаментальное правило работы с NULL нужно помнить при математических операциях в блоке SET?", options: [{text: "A) Число побеждает NULL", isCorrect: false}, {text: "B) NULL приравнивается к нулю", isCorrect: false}, {text: "C) Любая математическая операция с NULL всегда возвращает NULL", isCorrect: true}, {text: "D) Вызывает остановку сервера", isCorrect: false}, {text: "E) Удваивает число", isCorrect: false}] },
            { num: 46, text: "Вопрос 46. Как правильно изменить строку и внести в ячейку значение «данные отсутствуют»?", options: [{text: "A) SET column_name = 'пусто'", isCorrect: false}, {text: "B) SET column_name = 0", isCorrect: false}, {text: "C) SET column_name = NULL", isCorrect: true}, {text: "D) DELETE column_name", isCorrect: false}, {text: "E) REMOVE column_name", isCorrect: false}] },
            { num: 47, text: "Вопрос 47. Какая команда используется для удаления строк из таблицы?", options: [{text: "A) DROP TABLE", isCorrect: false}, {text: "B) REMOVE FROM", isCorrect: false}, {text: "C) DELETE FROM", isCorrect: true}, {text: "D) UPDATE SET NULL", isCorrect: false}, {text: "E) CLEAR TABLE", isCorrect: false}] },
            { num: 48, text: "Вопрос 48. Что произойдет, если выполнить: DELETE FROM users; без WHERE?", options: [{text: "A) Удалится схема, данные останутся", isCorrect: false}, {text: "B) Заблокирует как опасную", isCorrect: false}, {text: "C) Будут безвозвратно удалены абсолютно все строки из таблицы", isCorrect: true}, {text: "D) Удалится первая строка", isCorrect: false}, {text: "E) Переименует в архивную", isCorrect: false}] },
            { num: 49, text: "Вопрос 49. Что произойдет, если попытаться удалить строку из родительской таблицы, на которую ссылаются строки дочерней через FOREIGN KEY?", options: [{text: "A) Удалится, в дочерней станет NULL", isCorrect: false}, {text: "B) Удалятся везде", isCorrect: false}, {text: "C) СУБД заблокирует операцию и выдаст ошибку Foreign Key violation", isCorrect: true}, {text: "D) Переведет в режим чтения", isCorrect: false}, {text: "E) Скроется, но останется", isCorrect: false}] },
            { num: 50, text: "Вопрос 50. Для чего перед DELETE или UPDATE рекомендуется написать аналогичный запрос SELECT?", options: [{text: "A) Обязательное синтаксическое требование", isCorrect: false}, {text: "B) Чтобы заблокировать таблицу", isCorrect: false}, {text: "C) Чтобы визуально проверить и убедиться, какие именно строки попадут под удаление или модификацию", isCorrect: true}, {text: "D) Очистить кэш", isCorrect: false}, {text: "E) Создать резервную копию", isCorrect: false}] }
        ];

        const { useState, useEffect } = React;

        // Универсальная модалка для подтверждений
        const ModalConfirm = ({ isOpen, title, text, onConfirm, onCancel, confirmText = "Подтвердить", isDanger = false }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full fade-in">
                        <h3 className="text-xl font-bold text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 mb-6">{text}</p>
                        <div className="flex gap-3 justify-end">
                            <button onClick={onCancel} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-700 font-medium transition-colors">Отмена</button>
                            <button onClick={onConfirm} className={`px-4 py-2 rounded-xl text-white font-medium transition-colors ${isDanger ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'}`}>{confirmText}</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. ОСНОВНОЕ ПРИЛОЖЕНИЕ (App)
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [globalError, setGlobalError] = useState('');
            const [config, setConfig] = useState(null);
            const [view, setView] = useState('student_start'); 
            const [studentData, setStudentData] = useState({ name: '', group: '' });
            const [finalScore, setFinalScore] = useState(0);
            
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        // Авторизация
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        console.error("Auth error:", e);
                        if (e.code === 'auth/unauthorized-domain') {
                            setGlobalError('Ошибка: Домен сайта не разрешен в настройках Firebase (Authorized domains).');
                        } else {
                            setGlobalError('Не удалось подключиться к базе данных: ' + e.message);
                        }
                        setLoading(false);
                    }
                };

                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        await checkAndInitData(u);
                    } else {
                        setUser(null);
                        setLoading(false);
                    }
                });

                initFirebase();
                return () => unsubscribe();
            }, []);

            const checkAndInitData = async (currentUser) => {
                try {
                    if (!currentUser) return;
                    
                    const settingsRef = db.collection(getPath('settings')).doc('config');
                    let doc = await settingsRef.get();
                    
                    if (!doc.exists) {
                        await settingsRef.set({
                            isOpen: true,
                            adminUser: 'admin',
                            adminPass: 'admin123',
                            groups: ['ИСиП-21', 'ИСиП-22', 'ИБ-31']
                        });
                        doc = await settingsRef.get();
                    }
                    setConfig(doc.data());

                    // Инициализация вопросов
                    const qsRef = db.collection(getPath('questions'));
                    const qs = await qsRef.limit(1).get();
                    if (qs.empty) {
                        for (let q of INITIAL_QUESTIONS) {
                            await qsRef.add(q);
                        }
                    }

                    // Подписка на настройки
                    settingsRef.onSnapshot(snap => {
                        if (snap.exists) setConfig(snap.data());
                    });

                } catch (e) {
                    console.error("Init data error:", e);
                }
                setLoading(false);
            };

            if (globalError) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center border-t-8 border-red-500">
                        <div className="text-6xl mb-4">⚠️</div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-4">Ошибка подключения</h2>
                        <p className="text-slate-600 font-medium mb-4">{globalError}</p>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-500">
                    <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                    <p className="font-medium text-lg">Загрузка системы тестирования...</p>
                </div>
            );

            return (
                <div className="min-h-screen relative pb-10 bg-slate-50">
                    {view === 'student_start' && <StudentStart config={config} onStart={(data) => { setStudentData(data); setView('student_test'); }} />}
                    {view === 'student_test' && <StudentTest studentData={studentData} onFinish={(score) => { setFinalScore(score); setView('student_result'); }} user={user} />}
                    {view === 'student_result' && <StudentResult score={finalScore} />}
                    
                    {view === 'admin_login' && <AdminLogin config={config} onSuccess={() => setView('admin_panel')} onBack={() => setView('student_start')} />}
                    {view === 'admin_panel' && <AdminPanel config={config} onLogout={() => setView('student_start')} user={user} />}

                    {/* Секретная кнопка входа админа */}
                    {view === 'student_start' && (
                        <div 
                            className="fixed bottom-2 right-2 text-2xl opacity-5 hover:opacity-100 cursor-pointer transition-all duration-300 z-50 p-2"
                            title="Вход для преподавателя"
                            onClick={() => setView('admin_login')}
                        >
                            ❤️
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 4. ЭКРАНЫ СТУДЕНТА
        // ==========================================
        function StudentStart({ config, onStart }) {
            const [name, setName] = useState('');
            const [group, setGroup] = useState('');
            const [error, setError] = useState('');

            if (!config?.isOpen) {
                return (
                    <div className="min-h-screen flex items-center justify-center fade-in p-4">
                        <div className="bg-white p-10 rounded-3xl shadow-xl text-center max-w-md w-full">
                            <div className="text-6xl mb-6">🔒</div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">Тестирование закрыто</h2>
                            <p className="text-slate-500">Преподаватель временно ограничил доступ к прохождению теста. Пожалуйста, ожидайте.</p>
                        </div>
                    </div>
                );
            }

            const handleStart = (e) => {
                e.preventDefault();
                if (name.trim().length < 3) { setError('Пожалуйста, введите полное имя и фамилию'); return; }
                if (!group) { setError('Необходимо выбрать учебную группу'); return; }
                onStart({ name: name.trim(), group });
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                    <form onSubmit={handleStart} className="bg-white p-8 md:p-10 rounded-3xl shadow-xl max-w-md w-full">
                        <h2 className="text-3xl font-bold text-center text-blue-600 mb-2">Тестирование</h2>
                        <h3 className="text-md text-center text-slate-500 mb-8 border-b pb-6">Базы данных и язык SQL (50 вопросов)</h3>
                        
                        {error && <div className="bg-red-50 text-red-600 p-4 rounded-xl mb-6 text-sm font-medium border border-red-100">{error}</div>}

                        <div className="mb-5">
                            <label className="block text-slate-700 text-sm font-bold mb-2">Фамилия и Имя</label>
                            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Иванов Иван" 
                                className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-slate-50 focus:bg-white"/>
                        </div>

                        <div className="mb-8">
                            <label className="block text-slate-700 text-sm font-bold mb-2">Учебная группа</label>
                            <select value={group} onChange={e => setGroup(e.target.value)} 
                                className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white cursor-pointer">
                                <option value="">-- Выберите группу --</option>
                                {config?.groups?.map((g, i) => <option key={i} value={g}>{g}</option>)}
                            </select>
                        </div>

                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl transition-colors shadow-lg shadow-blue-200 flex justify-center items-center gap-2">
                            Начать тест 🚀
                        </button>
                    </form>
                </div>
            );
        }

        function StudentTest({ studentData, onFinish, user }) {
            const [questions, setQuestions] = useState([]);
            const [answers, setAnswers] = useState({});
            const [loading, setLoading] = useState(true);
            const [submitting, setSubmitting] = useState(false);
            const [confirmModal, setConfirmModal] = useState(false);

            useEffect(() => {
                if(!user) return;
                const unsub = db.collection(getPath('questions')).orderBy('num').onSnapshot(snap => {
                    setQuestions(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    setLoading(false);
                }, err => console.error("Test load error", err));
                return () => unsub();
            }, [user]);

            const triggerSubmit = () => {
                const answeredCount = Object.keys(answers).length;
                if(answeredCount < questions.length) {
                    setConfirmModal(true);
                } else {
                    executeSubmit();
                }
            };

            const executeSubmit = async () => {
                setConfirmModal(false);
                setSubmitting(true);
                
                let score = 0;
                let detailedAnswers = [];

                questions.forEach(q => {
                    const selectedIdx = answers[q.id];
                    const selectedOpt = q.options[selectedIdx];
                    const isCorrect = selectedOpt ? selectedOpt.isCorrect : false;
                    if(isCorrect) score++;
                    
                    detailedAnswers.push({
                        questionText: q.text,
                        selectedText: selectedOpt ? selectedOpt.text : "Не ответил",
                        isCorrect: isCorrect
                    });
                });

                try {
                    await db.collection(getPath('results')).add({
                        studentName: studentData.name,
                        group: studentData.group,
                        score: score,
                        maxScore: questions.length,
                        answers: detailedAnswers,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    onFinish(score);
                } catch (e) {
                    console.error("Submit error", e);
                    setSubmitting(false);
                }
            };

            if (loading) return <div className="text-center mt-20 text-xl font-medium text-slate-500">Подготовка вопросов...</div>;

            const answeredCount = Object.keys(answers).length;
            const progress = (answeredCount / questions.length) * 100 || 0;

            return (
                <div className="max-w-4xl mx-auto p-4 pt-8 fade-in">
                    
                    {/* Липкая шапка с прогрессом */}
                    <div className="bg-white rounded-2xl shadow-sm p-5 mb-8 sticky top-4 z-10 border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex flex-col items-center md:items-start w-full md:w-auto">
                            <div className="font-bold text-slate-800 text-lg">{studentData.name}</div>
                            <div className="text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-full inline-block mt-1">{studentData.group}</div>
                        </div>
                        <div className="w-full md:w-1/2 flex items-center gap-4">
                            <div className="w-full bg-slate-100 rounded-full h-3">
                                <div className="bg-blue-500 h-3 rounded-full transition-all duration-300" style={{width: `${progress}%`}}></div>
                            </div>
                            <div className="text-sm font-bold text-blue-700 whitespace-nowrap">
                                {answeredCount} / {questions.length}
                            </div>
                        </div>
                    </div>

                    <div className="space-y-6">
                        {questions.map((q, i) => (
                            <div key={q.id} className="bg-white rounded-2xl shadow-sm p-6 md:p-8 border border-slate-100 hover:border-blue-100 transition-colors">
                                <h3 className="text-lg font-semibold text-slate-800 mb-5 leading-relaxed whitespace-pre-wrap">{q.text}</h3>
                                <div className="space-y-3">
                                    {q.options.map((opt, optIdx) => {
                                        const isSelected = answers[q.id] === optIdx;
                                        return (
                                            <label 
                                                key={optIdx} 
                                                onClick={() => setAnswers({...answers, [q.id]: optIdx})}
                                                className={`block p-4 rounded-xl border-2 cursor-pointer transition-all ${isSelected ? 'bg-blue-50 border-blue-400 shadow-sm' : 'hover:bg-slate-50 border-slate-100'}`}
                                            >
                                                <div className="flex items-center gap-3 pointer-events-none">
                                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${isSelected ? 'border-blue-600' : 'border-slate-300'}`}>
                                                        {isSelected && <div className="w-2.5 h-2.5 bg-blue-600 rounded-full"></div>}
                                                    </div>
                                                    <span className={`text-slate-700 ${isSelected ? 'font-medium' : ''}`}>{opt.text}</span>
                                                </div>
                                            </label>
                                        )
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    <button onClick={triggerSubmit} disabled={submitting} 
                        className={`w-full py-5 rounded-2xl text-white font-bold text-lg mt-8 mb-10 shadow-xl transition-all flex items-center justify-center gap-2 ${submitting ? 'bg-slate-400 cursor-not-allowed' : 'bg-green-500 hover:bg-green-600 hover:-translate-y-1'}`}>
                        {submitting ? 'Отправка результатов...' : '🏁 Завершить тест и узнать балл'}
                    </button>

                    <ModalConfirm 
                        isOpen={confirmModal}
                        title="Вы ответили не на все вопросы!"
                        text={`У вас осталось неотвеченных вопросов: ${questions.length - answeredCount}. Вы уверены, что хотите завершить тест?`}
                        confirmText="Да, завершить"
                        onConfirm={executeSubmit}
                        onCancel={() => setConfirmModal(false)}
                    />
                </div>
            );
        }

        function StudentResult({ score }) {
            return (
                <div className="min-h-screen flex items-center justify-center p-4 fade-in bg-slate-50">
                    <div className="bg-white p-10 rounded-3xl shadow-xl text-center max-w-md w-full border-t-8 border-green-500 relative overflow-hidden">
                        <div className="absolute -top-10 -right-10 text-9xl opacity-10">🏆</div>
                        <div className="text-7xl mb-6 relative z-10">🎉</div>
                        <h2 className="text-3xl font-bold text-slate-800 mb-2 relative z-10">Тест завершен!</h2>
                        <p className="text-slate-500 mb-8 relative z-10">Ваши ответы успешно сохранены и отправлены преподавателю.</p>
                        
                        <div className="bg-slate-50 rounded-2xl p-8 mb-8 border border-slate-100 relative z-10">
                            <div className="text-sm text-slate-500 uppercase tracking-widest font-bold mb-2">Итоговый балл</div>
                            <div className="text-6xl font-black text-blue-600">{score}</div>
                        </div>
                        
                        <button onClick={() => window.location.reload()} className="text-blue-600 hover:text-blue-800 font-semibold bg-blue-50 px-6 py-3 rounded-xl transition-colors relative z-10 w-full">
                            Вернуться на главную
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 5. ПАНЕЛЬ АДМИНИСТРАТОРА
        // ==========================================
        function AdminLogin({ config, onSuccess, onBack }) {
            const [login, setLogin] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (login === config.adminUser && password === config.adminPass) {
                    onSuccess();
                } else {
                    setError('Неверный логин или пароль');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 fade-in">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full">
                        <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">🛡️</div>
                        <h2 className="text-2xl font-bold text-center text-slate-800 mb-6">Вход преподавателя</h2>
                        {error && <div className="bg-red-50 text-red-600 p-3 rounded-xl mb-4 text-center text-sm font-medium border border-red-100">{error}</div>}
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="text" placeholder="Логин (admin)" value={login} onChange={e=>setLogin(e.target.value)}
                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 transition" />
                            <input type="password" placeholder="Пароль (admin123)" value={password} onChange={e=>setPassword(e.target.value)}
                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 transition" />
                            <button className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-lg mt-2">Войти в панель</button>
                            <button type="button" onClick={onBack} className="w-full text-slate-500 hover:text-slate-700 text-sm font-medium py-2">← Вернуться к тесту</button>
                        </form>
                    </div>
                </div>
            );
        }

        function AdminPanel({ config, onLogout, user }) {
            const [activeTab, setActiveTab] = useState('results'); 

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row fade-in">
                    {/* Sidebar */}
                    <div className="w-full md:w-64 bg-slate-900 text-slate-300 flex flex-col shadow-2xl z-20">
                        <div className="p-6 font-bold text-xl text-white border-b border-slate-800 flex items-center gap-3">
                            <span className="text-2xl">🎓</span> Админ-панель
                        </div>
                        <div className="flex-1 p-4 space-y-2">
                            <button onClick={() => setActiveTab('results')} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 font-medium transition-all ${activeTab === 'results' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <span>📊</span> Результаты
                            </button>
                            <button onClick={() => setActiveTab('questions')} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 font-medium transition-all ${activeTab === 'questions' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <span>📝</span> Редактор вопросов
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 font-medium transition-all ${activeTab === 'settings' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <span>⚙️</span> Настройки
                            </button>
                        </div>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={onLogout} className="w-full py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-sm font-medium transition-colors">Выйти из системы</button>
                        </div>
                    </div>
                    
                    {/* Content */}
                    <div className="flex-1 p-6 md:p-10 overflow-y-auto h-screen bg-slate-50">
                        {activeTab === 'results' && <AdminResults config={config} user={user} />}
                        {activeTab === 'questions' && <AdminQuestions user={user} />}
                        {activeTab === 'settings' && <AdminSettings config={config} user={user} />}
                    </div>
                </div>
            );
        }

        // --- Tabs Content ---

        function AdminResults({ config, user }) {
            const [results, setResults] = useState([]);
            const [filterGroup, setFilterGroup] = useState('Все');
            const [deleteId, setDeleteId] = useState(null);
            const [dbError, setDbError] = useState('');

            useEffect(() => {
                if(!user) return;
                const unsub = db.collection(getPath('results')).orderBy('timestamp', 'desc').onSnapshot(snap => {
                    setResults(snap.docs.map(d => ({id: d.id, ...d.data(), expanded: false})));
                    setDbError('');
                }, err => {
                    console.error(err);
                    setDbError(err.message);
                });
                return () => unsub();
            }, [user]);

            const toggleExpand = (id) => {
                setResults(results.map(r => r.id === id ? {...r, expanded: !r.expanded} : r));
            };

            const adjustScore = async (id, currentScore, delta) => {
                const newScore = Math.max(0, currentScore + delta);
                await db.collection(getPath('results')).doc(id).update({ score: newScore });
            };

            const confirmDelete = async () => {
                if(deleteId) {
                    await db.collection(getPath('results')).doc(deleteId).delete();
                    setDeleteId(null);
                }
            };

            const filtered = filterGroup === 'Все' ? results : results.filter(r => r.group === filterGroup);
            const avgScore = filtered.length ? (filtered.reduce((sum, r) => sum + r.score, 0) / filtered.length).toFixed(1) : 0;

            if (dbError) {
                return <div className="bg-red-50 text-red-600 p-6 rounded-2xl border border-red-200 shadow-sm"><b>Ошибка загрузки результатов:</b> {dbError}</div>;
            }

            return (
                <div className="fade-in max-w-6xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
                        <div>
                            <h2 className="text-3xl font-bold text-slate-800 mb-2">Результаты студентов</h2>
                            <p className="text-slate-500 font-medium">Сдали: {filtered.length} | Средний балл: <span className="font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">{avgScore}</span></p>
                        </div>
                        <select value={filterGroup} onChange={e => setFilterGroup(e.target.value)} className="px-5 py-3 border border-slate-200 rounded-xl shadow-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-slate-700">
                            <option value="Все">Все группы</option>
                            {config?.groups?.map((g,i) => <option key={i} value={g}>{g}</option>)}
                        </select>
                    </div>

                    <div className="bg-white shadow-sm border border-slate-200 rounded-2xl overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse min-w-[800px]">
                                <thead>
                                    <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                                        <th className="p-5 font-bold">Студент</th>
                                        <th className="p-5 font-bold">Группа</th>
                                        <th className="p-5 font-bold">Дата сдачи</th>
                                        <th className="p-5 font-bold text-center">Итоговый Балл</th>
                                        <th className="p-5 font-bold text-right">Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.length === 0 && <tr><td colSpan="5" className="p-10 text-center text-slate-400 font-medium">Нет данных для отображения</td></tr>}
                                    {filtered.map(r => (
                                        <React.Fragment key={r.id}>
                                            <tr className="border-b border-slate-100 hover:bg-slate-50/50 transition-colors">
                                                <td className="p-5 font-bold text-slate-800">{r.studentName}</td>
                                                <td className="p-5 text-slate-600 font-medium"><span className="bg-slate-100 px-2 py-1 rounded-md">{r.group}</span></td>
                                                <td className="p-5 text-slate-500 text-sm">
                                                    {r.timestamp ? new Date(r.timestamp.toDate()).toLocaleString('ru-RU', {day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute:'2-digit'}) : 'Только что'}
                                                </td>
                                                <td className="p-5 text-center">
                                                    <div className="flex items-center justify-center gap-3">
                                                        <button onClick={()=>adjustScore(r.id, r.score, -1)} className="w-8 h-8 rounded-full bg-slate-100 hover:bg-red-100 hover:text-red-600 text-slate-600 flex items-center justify-center font-bold transition-colors shadow-sm">-</button>
                                                        <span className="font-black text-xl text-blue-600 w-10">{r.score}</span>
                                                        <button onClick={()=>adjustScore(r.id, r.score, 1)} className="w-8 h-8 rounded-full bg-slate-100 hover:bg-green-100 hover:text-green-600 text-slate-600 flex items-center justify-center font-bold transition-colors shadow-sm">+</button>
                                                    </div>
                                                </td>
                                                <td className="p-5 text-right space-x-3">
                                                    <button onClick={() => toggleExpand(r.id)} className="text-blue-600 hover:text-blue-800 text-sm font-bold bg-blue-50 px-3 py-1.5 rounded-lg transition-colors">Ответы {r.expanded ? '▲' : '▼'}</button>
                                                    <button onClick={() => setDeleteId(r.id)} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded-lg transition-colors" title="Удалить">🗑️</button>
                                                </td>
                                            </tr>
                                            {r.expanded && (
                                                <tr className="bg-slate-50/80 border-b border-slate-200 shadow-inner">
                                                    <td colSpan="5" className="p-6">
                                                        <div className="grid gap-3 max-h-[400px] overflow-y-auto bg-white p-5 rounded-xl border border-slate-200 shadow-sm custom-scrollbar">
                                                            {r.answers.map((ans, idx) => (
                                                                <div key={idx} className="text-sm p-3 border rounded-lg bg-slate-50">
                                                                    <div className="font-semibold text-slate-800 mb-2 leading-relaxed">{idx+1}. {ans.questionText}</div>
                                                                    <div className={`flex items-start gap-2 font-medium ${ans.isCorrect ? 'text-green-600' : 'text-red-500'}`}>
                                                                        <span className="mt-0.5">{ans.isCorrect ? '✅' : '❌'}</span>
                                                                        <span>{ans.selectedText}</span>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <ModalConfirm 
                        isOpen={!!deleteId}
                        title="Удаление результата"
                        text="Вы уверены, что хотите безвозвратно удалить результат этого студента?"
                        confirmText="Удалить"
                        isDanger={true}
                        onConfirm={confirmDelete}
                        onCancel={() => setDeleteId(null)}
                    />
                </div>
            );
        }

        function AdminQuestions({ user }) {
            const [questions, setQuestions] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [deleteId, setDeleteId] = useState(null);
            const [dbError, setDbError] = useState('');

            useEffect(() => {
                if(!user) return;
                const unsub = db.collection(getPath('questions')).orderBy('num').onSnapshot(snap => {
                    setQuestions(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    setDbError('');
                }, err => {
                    console.error(err);
                    setDbError(err.message);
                });
                return () => unsub();
            }, [user]);

            const addQuestion = async () => {
                const newNum = questions.length ? Math.max(...questions.map(q=>q.num)) + 1 : 1;
                await db.collection(getPath('questions')).add({
                    num: newNum,
                    text: "Текст нового вопроса",
                    options: [
                        {text: "Правильный вариант", isCorrect: true},
                        {text: "Неправильный вариант", isCorrect: false}
                    ]
                });
            };

            const confirmDelete = async () => {
                if(deleteId) {
                    await db.collection(getPath('questions')).doc(deleteId).delete();
                    setDeleteId(null);
                }
            };

            const updateQuestion = async (id, data) => {
                await db.collection(getPath('questions')).doc(id).update(data);
                setEditingId(null);
            };

            const moveQuestion = async (index, direction) => {
                if (index + direction < 0 || index + direction >= questions.length) return;
                const q1 = questions[index];
                const q2 = questions[index + direction];
                await db.collection(getPath('questions')).doc(q1.id).update({num: q2.num});
                await db.collection(getPath('questions')).doc(q2.id).update({num: q1.num});
            };

            if (dbError) {
                return <div className="bg-red-50 text-red-600 p-6 rounded-2xl border border-red-200 shadow-sm"><b>Ошибка загрузки вопросов:</b> {dbError}</div>;
            }

            return (
                <div className="fade-in max-w-4xl mx-auto pb-10">
                    <div className="flex justify-between items-center mb-8 sticky top-0 bg-slate-50 py-4 z-10">
                        <h2 className="text-3xl font-bold text-slate-800">Редактор вопросов <span className="text-lg text-slate-400 font-normal">({questions.length})</span></h2>
                        <button onClick={addQuestion} className="bg-green-500 hover:bg-green-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-green-200 transition-transform hover:-translate-y-0.5 flex items-center gap-2">
                            <span>➕</span> Новый вопрос
                        </button>
                    </div>

                    <div className="space-y-5">
                        {questions.map((q, index) => (
                            <div key={q.id} className={`bg-white p-5 md:p-6 rounded-2xl shadow-sm border transition-all ${editingId === q.id ? 'border-blue-300 ring-4 ring-blue-50' : 'border-slate-200 hover:border-slate-300'}`}>
                                <div className="flex flex-col md:flex-row gap-4 md:gap-6">
                                    {/* Управление порядком */}
                                    <div className="flex md:flex-col items-center justify-center gap-3 border-b md:border-b-0 md:border-r border-slate-100 pb-3 md:pb-0 md:pr-6 shrink-0">
                                        <button onClick={()=>moveQuestion(index, -1)} disabled={index===0} className="p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50 disabled:opacity-30 disabled:hover:bg-slate-50 transition-colors">▲</button>
                                        <span className="font-black text-xl text-slate-300 w-8 text-center">{q.num}</span>
                                        <button onClick={()=>moveQuestion(index, 1)} disabled={index===questions.length-1} className="p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50 disabled:opacity-30 disabled:hover:bg-slate-50 transition-colors">▼</button>
                                    </div>

                                    {/* Контент вопроса */}
                                    <div className="flex-1 w-full">
                                        {editingId === q.id ? (
                                            <QuestionEditor q={q} onSave={(data) => updateQuestion(q.id, data)} onCancel={() => setEditingId(null)} />
                                        ) : (
                                            <div>
                                                <div className="flex justify-between items-start mb-4 gap-4">
                                                    <h3 className="font-bold text-lg text-slate-800 whitespace-pre-wrap leading-snug">{q.text}</h3>
                                                    <div className="flex gap-2 shrink-0">
                                                        <button onClick={()=>setEditingId(q.id)} className="text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-sm font-bold border border-blue-100 transition-colors">✏️ Ред.</button>
                                                        <button onClick={()=>setDeleteId(q.id)} className="text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm font-bold border border-red-100 transition-colors">🗑️</button>
                                                    </div>
                                                </div>
                                                <div className="grid gap-2">
                                                    {q.options.map((opt, i) => (
                                                        <div key={i} className={`text-sm px-4 py-3 rounded-xl flex items-start gap-3 ${opt.isCorrect ? 'bg-green-50 text-green-900 border border-green-200 font-medium shadow-sm' : 'text-slate-600 bg-slate-50 border border-transparent'}`}>
                                                            <div className="mt-0.5 shrink-0">{opt.isCorrect ? '✅' : '⚪'}</div>
                                                            <div>{opt.text}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <ModalConfirm 
                        isOpen={!!deleteId}
                        title="Удаление вопроса"
                        text="Удалить этот вопрос из теста? Это действие нельзя отменить."
                        confirmText="Удалить"
                        isDanger={true}
                        onConfirm={confirmDelete}
                        onCancel={() => setDeleteId(null)}
                    />
                </div>
            );
        }

        function QuestionEditor({ q, onSave, onCancel }) {
            const [text, setText] = useState(q.text);
            const [num, setNum] = useState(q.num);
            const [options, setOptions] = useState([...q.options]);

            const updateOption = (idx, field, val) => {
                const newOpts = [...options];
                newOpts[idx][field] = val;
                setOptions(newOpts);
            };

            const setCorrect = (idx) => {
                const newOpts = options.map((opt, i) => ({...opt, isCorrect: i === idx}));
                setOptions(newOpts);
            };

            const addOption = () => setOptions([...options, {text: "Новый вариант", isCorrect: false}]);
            const removeOption = (idx) => setOptions(options.filter((_, i) => i !== idx));

            return (
                <div className="animate-fade-in bg-white rounded-xl">
                    <div className="flex flex-col md:flex-row gap-4 mb-5">
                        <div className="w-full md:w-24 shrink-0">
                            <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Номер</label>
                            <input type="number" value={num} onChange={e=>setNum(Number(e.target.value))} className="w-full border-2 border-slate-200 rounded-xl p-3 focus:ring-0 focus:border-blue-500 outline-none font-bold text-center" />
                        </div>
                        <div className="flex-1">
                            <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Текст вопроса</label>
                            <textarea value={text} onChange={e=>setText(e.target.value)} rows="3" className="w-full border-2 border-slate-200 rounded-xl p-3 focus:ring-0 focus:border-blue-500 outline-none resize-y" placeholder="Введите вопрос..."></textarea>
                        </div>
                    </div>
                    
                    <div className="space-y-3 mb-6">
                        <label className="text-xs font-bold text-slate-500 uppercase block">Варианты ответов (отметьте правильный)</label>
                        {options.map((opt, idx) => (
                            <div key={idx} className={`flex items-center gap-3 p-2 rounded-xl border-2 transition-colors ${opt.isCorrect ? 'border-green-400 bg-green-50' : 'border-slate-100 bg-slate-50'}`}>
                                <div className="pl-2 cursor-pointer shrink-0" onClick={() => setCorrect(idx)} title="Отметить как правильный">
                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${opt.isCorrect ? 'border-green-600 bg-green-600' : 'border-slate-300 bg-white'}`}>
                                        {opt.isCorrect && <span className="text-white text-xs">✓</span>}
                                    </div>
                                </div>
                                <input type="text" value={opt.text} onChange={e=>updateOption(idx, 'text', e.target.value)} className={`flex-1 bg-transparent p-2 outline-none font-medium ${opt.isCorrect ? 'text-green-900' : 'text-slate-700'}`} placeholder="Текст варианта..." />
                                <button onClick={()=>removeOption(idx)} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-100 rounded-lg shrink-0 transition-colors" title="Удалить вариант">✕</button>
                            </div>
                        ))}
                        <button onClick={addOption} className="text-blue-600 text-sm font-bold mt-2 hover:bg-blue-50 px-4 py-2 rounded-lg transition-colors border border-blue-100">+ Добавить вариант</button>
                    </div>

                    <div className="flex flex-col-reverse md:flex-row gap-3 justify-end pt-4 border-t border-slate-100">
                        <button onClick={onCancel} className="px-6 py-2.5 rounded-xl text-slate-600 bg-slate-100 hover:bg-slate-200 font-bold transition-colors">Отмена</button>
                        <button onClick={() => onSave({text, num, options})} className="px-6 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold transition-colors shadow-lg shadow-blue-200">💾 Сохранить</button>
                    </div>
                </div>
            );
        }

        function AdminSettings({ config, user }) {
            const [newGroup, setNewGroup] = useState('');
            const [adminUser, setAdminUser] = useState(config.adminUser || 'admin');
            const [adminPass, setAdminPass] = useState(config.adminPass || 'admin123');
            const [saved, setSaved] = useState(false);

            const toggleStatus = async () => {
                if(!user) return;
                await db.collection(getPath('settings')).doc('config').update({ isOpen: !config.isOpen });
            };

            const addGroup = async (e) => {
                e.preventDefault();
                if(!newGroup.trim() || !user) return;
                const updatedGroups = [...(config.groups || []), newGroup.trim()];
                await db.collection(getPath('settings')).doc('config').update({ groups: updatedGroups });
                setNewGroup('');
            };

            const removeGroup = async (g) => {
                if(!user) return;
                const updatedGroups = config.groups.filter(x => x !== g);
                await db.collection(getPath('settings')).doc('config').update({ groups: updatedGroups });
            };

            const saveCreds = async (e) => {
                e.preventDefault();
                if(!user) return;
                await db.collection(getPath('settings')).doc('config').update({ adminUser, adminPass });
                setSaved(true);
                setTimeout(() => setSaved(false), 3000);
            };

            return (
                <div className="fade-in max-w-4xl mx-auto space-y-6">
                    <h2 className="text-3xl font-bold text-slate-800 mb-8">Настройки системы</h2>

                    {/* Статус теста */}
                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-center justify-between gap-6">
                        <div className="flex items-center gap-5">
                            <div className={`w-14 h-14 rounded-full flex items-center justify-center text-2xl ${config.isOpen ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                {config.isOpen ? '🔓' : '🔒'}
                            </div>
                            <div>
                                <h3 className="font-bold text-xl text-slate-800">Доступ к тестированию</h3>
                                <p className="text-slate-500 mt-1">Текущий статус: {config.isOpen ? 'Студенты могут сдавать тест' : 'Тест закрыт для прохождения'}</p>
                            </div>
                        </div>
                        <button onClick={toggleStatus} className={`w-full md:w-auto px-8 py-3.5 rounded-xl font-bold text-white transition-transform hover:-translate-y-0.5 shadow-lg ${config.isOpen ? 'bg-red-500 hover:bg-red-600 shadow-red-200' : 'bg-green-500 hover:bg-green-600 shadow-green-200'}`}>
                            {config.isOpen ? 'Остановить тест' : 'Открыть тест'}
                        </button>
                    </div>

                    <div className="grid md:grid-cols-2 gap-6">
                        {/* Группы */}
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col">
                            <div className="flex items-center gap-3 mb-6">
                                <span className="text-2xl">👥</span>
                                <h3 className="font-bold text-xl text-slate-800">Учебные группы</h3>
                            </div>
                            <form onSubmit={addGroup} className="flex gap-2 mb-6">
                                <input type="text" value={newGroup} onChange={e=>setNewGroup(e.target.value)} placeholder="Название (напр. ИС-31)" className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-blue-500 focus:bg-white transition-colors" />
                                <button type="submit" className="bg-blue-600 text-white px-5 font-bold rounded-xl hover:bg-blue-700 transition shadow-md shadow-blue-200">Добавить</button>
                            </form>
                            <div className="flex flex-wrap gap-2 overflow-y-auto max-h-[200px] content-start custom-scrollbar flex-1">
                                {config?.groups?.map((g, i) => (
                                    <div key={i} className="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-3 border border-slate-200">
                                        {g}
                                        <button onClick={()=>removeGroup(g)} className="w-5 h-5 flex items-center justify-center bg-white rounded text-red-500 hover:bg-red-500 hover:text-white transition-colors">✕</button>
                                    </div>
                                ))}
                                {(!config?.groups || config.groups.length === 0) && <span className="text-sm text-slate-400 font-medium">Нет добавленных групп</span>}
                            </div>
                        </div>

                        {/* Доступы */}
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col">
                            <div className="flex items-center gap-3 mb-6">
                                <span className="text-2xl">🔑</span>
                                <h3 className="font-bold text-xl text-slate-800">Доступы администратора</h3>
                            </div>
                            <form onSubmit={saveCreds} className="space-y-5 flex-1 flex flex-col justify-between">
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-600 mb-2">Логин</label>
                                        <input type="text" value={adminUser} onChange={e=>setAdminUser(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-blue-500 focus:bg-white transition-colors font-medium text-slate-800" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-600 mb-2">Пароль</label>
                                        <input type="text" value={adminPass} onChange={e=>setAdminPass(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-blue-500 focus:bg-white transition-colors font-medium text-slate-800" required />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 transition flex justify-center items-center gap-2 shadow-lg mt-4">
                                    Сохранить доступы {saved && <span className="text-green-400">✓</span>}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
